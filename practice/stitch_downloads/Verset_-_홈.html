<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            -webkit-font-smoothing: antialiased;

        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .poem-fade-in {
            animation: fadeIn 2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ambient-glow {
            box-shadow: 0 20px 50px -10px rgba(82, 98, 84, 0.08);
        }
    </style>

                        "on-primary-container": "#f6fff4",
                        "secondary-fixed-dim": "#ecbbba",
                        "on-error-container": "#93000a",
                        "tertiary": "#5d5c58",
                        "secondary-container": "#fdcbcb",
                        "surface-tint": "#526254",
                        "primary": "#506052",
                        "surface-container-highest": "#e4e2e1",
                        "tertiary-fixed": "#e5e2dc",
                        "inverse-on-surface": "#f3f0f0",
                        "surface-dim": "#dcd9d9",
                        "on-surface": "#1b1c1c",
                        "on-surface-variant": "#434843",
                        "surface": "#fcf9f8",
                        "primary-fixed-dim": "#b9cbb9",
                        "tertiary-container": "#767470",
                        "outline-variant": "#c3c8c1",
                        "primary-fixed": "#d5e7d5",
                        "on-tertiary-container": "#fdffdf",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#603d3e",
                        "primary-container": "#687969",
                        "on-primary-fixed": "#101f13",

                        "surface-bright": "#fcf9f8",

                    "borderRadius": {

                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "64px",
                        "margin-mobile": "24px",
                        "poem-vertical-gap": "48px",
                        "gutter": "16px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "poem-body": ["Literata", "serif"],
                        "poem-display": ["Literata", "serif"],
                        "caption": ["Literata", "serif"],

                        "poem-display-mobile": ["Literata", "serif"]

                    "fontSize": {

                        "caption": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "ui-label-lg": ["16px", { "lineHeight": "24px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "ui-label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.08em", "fontWeight": "500" }],
                        "poem-display-mobile": ["28px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                },
            },
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-ui-label-lg selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-md dark:bg-background/80 flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed hover:opacity-70 transition-opacity cursor-pointer active:scale-95 duration-200">menu_book</span>
<h1 class="font-poem-display text-poem-display-mobile text-primary dark:text-primary-fixed italic">Verset</h1>
</div>
<div class="flex items-center gap-6">
<span class="material-symbols-outlined text-on-surface-variant hover:opacity-70 transition-opacity cursor-pointer">search</span>
<span class="material-symbols-outlined text-on-surface-variant hover:opacity-70 transition-opacity cursor-pointer">account_circle</span>
</div>
</header>
<main class="pt-16 pb-24 min-h-screen flex flex-col items-center">
<!-- Hero Section -->
<section class="w-full max-w-[720px] px-margin-mobile md:px-0 mt-8 mb-poem-vertical-gap">
<div class="relative w-full aspect-[4/5] md:aspect-video rounded-xl overflow-hidden shadow-sm">
<img alt="Quiet literary forest" class="w-full h-full object-cover grayscale-[20%] brightness-90" data-alt="A tranquil and moody close-up of an open vintage book resting on a mossy stone in a misty, ethereal forest. Soft, diffused morning light filters through ancient trees, creating a serene and poetic atmosphere. The color palette is dominated by deep forest greens, earthy browns, and the creamy parchment of the pages. The aesthetic is minimalist and quiet, evoking a sense of solitude and literary inspiration." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCey-R3n_NQUzixh1QEu-xdcNl4CkMf7d9afNT73KiGXctLcph85GToIOIDy4BcC5NRKMUoR9KA1GWiHDOgD0NJc3SyJFJQXvDehOaB3jC5FohiKHKY877WWOrQJFTJGiXcWQz_i1TQ6YXVdYW1WDnO86EJCHsGyy6juC13WDa-PntmCRatsMymRbriMiDoIG5ZP9YGpk2F3HJp0RVbfGQzi5WEunT5hpW6vZn-KXeik8oqOYEU-WM54J-iQ6Zt-ef6QXAIql4ygOU"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
<div class="absolute bottom-8 left-8 right-8">
<span class="font-ui-label-sm text-white/80 tracking-widest uppercase mb-2 block">Featured Quote</span>
<h2 class="font-poem-display-mobile md:font-poem-display text-white text-2xl md:text-3xl leading-snug">
                        오늘의 시 한 구절
                    </h2>
</div>
</div>
</section>
<!-- Poem Content -->
<article class="w-full max-w-[720px] px-margin-mobile md:px-0 flex flex-col items-center text-center poem-fade-in">
<div class="mb-poem-vertical-gap">
<p class="font-poem-body text-poem-body text-on-surface-variant italic mb-6">
                    "모든 사라지는 것들은<br/>
                    뒤에 여백을 남긴다."
                </p>
<p class="font-ui-label-sm text-on-surface-variant/60 tracking-widest uppercase">
                    고정희, &lt;여백&gt; 중에서
                </p>
</div>
<!-- CTA -->
<button class="group relative px-10 py-4 bg-primary text-on-primary rounded-full font-ui-label-lg transition-all duration-300 hover:bg-primary-container hover:shadow-lg active:scale-95" onclick="this.classList.add('scale-95')">
<span class="flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
                    시 생성하기
                </span>
</button>
<div class="mt-8 flex gap-2">
<span class="inline-block px-3 py-1 bg-secondary/10 text-secondary rounded-full font-ui-label-sm text-[10px] tracking-wider uppercase">고독</span>
<span class="inline-block px-3 py-1 bg-secondary/10 text-secondary rounded-full font-ui-label-sm text-[10px] tracking-wider uppercase">자연</span>
<span class="inline-block px-3 py-1 bg-secondary/10 text-secondary rounded-full font-ui-label-sm text-[10px] tracking-wider uppercase">여백</span>
</div>
</article>
<!-- Decorative Progress -->
<div class="w-full max-w-[720px] mt-24 mb-12 px-margin-mobile opacity-20">
<div class="h-[1px] bg-outline w-full relative">
<div class="absolute top-0 left-0 h-[1px] bg-primary w-1/3 transition-all duration-1000"></div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-background/80 backdrop-blur-md dark:bg-background/80 flex justify-around items-center py-4 px-margin-mobile shadow-sm dark:shadow-none">
<!-- Home (Active) -->
<a class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed font-bold hover:text-primary dark:hover:text-primary-fixed transition-colors translate-y-[-2px]" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-ui-label-sm text-ui-label-sm">Home</span>
</a>
<!-- Create -->
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 dark:text-on-surface-variant/60 hover:text-primary dark:hover:text-primary-fixed transition-all duration-300 active:scale-95" href="#">
<span class="material-symbols-outlined mb-1">auto_awesome</span>
<span class="font-ui-label-sm text-ui-label-sm">Create</span>
</a>
<!-- Library -->
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 dark:text-on-surface-variant/60 hover:text-primary dark:hover:text-primary-fixed transition-all duration-300 active:scale-95" href="#">
<span class="material-symbols-outlined mb-1">auto_stories</span>
<span class="font-ui-label-sm text-ui-label-sm">Library</span>
</a>
</nav>
<script>
        // Simple micro-interaction for the "featured" feeling
        document.addEventListener('scroll', () => {
            const progress = document.querySelector('.absolute.top-0.left-0');
            const scrollPercent = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
            if (progress) progress.style.width = Math.min(scrollPercent + 33, 100) + '%';
        });

        // Toggle active state visualization simulation
        const navLinks = document.querySelectorAll('nav a');
        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                navLinks.forEach(l => {
                    l.classList.remove('text-primary', 'font-bold', 'translate-y-[-2px]');
                    l.classList.add('text-on-surface-variant/60');
                    const icon = l.querySelector('.material-symbols-outlined');
                    if (icon) icon.style.fontVariationSettings = "'FILL' 0";
                });
                link.classList.add('text-primary', 'font-bold', 'translate-y-[-2px]');
                link.classList.remove('text-on-surface-variant/60');
                const activeIcon = link.querySelector('.material-symbols-outlined');
                if (activeIcon) activeIcon.style.fontVariationSettings = "'FILL' 1";
            });
        });
    </script>
</body></html>
