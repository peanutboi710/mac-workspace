<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>callback2</title>
</head>
<body>
    <button>click</button>

    <script>
        const a = ["apple", "banana", "orange"];
        a.forEach(console.log);

        document
        .querySelector("button")
        .addEventListener("click", () => console.log("clicked"));
    </script>
</body>
</html> ㅈ
