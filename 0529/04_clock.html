<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section id="clock">

    </section>
    <script>
        const clock = document.querySelector("#clock");
        setInterval(() => {
            clock.textContent = new Date().toLocaleTimeString();
        }, 500);
    </script>
</body>
</html>
